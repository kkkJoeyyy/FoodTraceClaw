services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://localhost:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:7b}
      - VL_MODEL=${VL_MODEL:-gpt-4o}
      - GEOCODE_PROVIDER=${GEOCODE_PROVIDER:-osm}
      - AMAP_API_KEY=${AMAP_API_KEY:-}
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  wechaty-bridge:
    build: ./wechaty-bridge
    environment:
      - BACKEND_URL=http://backend:8000
      - WECHATY_PUPPET=${WECHATY_PUPPET:-wechaty-puppet-wechat4u}
      - WECHATY_TOKEN=${WECHATY_TOKEN:-}
    depends_on:
      - backend
    profiles:
      - wechat
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ./ollama:/root/.ollama
    profiles:
      - ollama
    restart: unless-stopped
